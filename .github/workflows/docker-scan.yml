name: "Container Image Scan → Auto-Create Issues → Assign to Copilot"

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly on Monday at 9am UTC
  workflow_dispatch: # Manual trigger for workshop demo

permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - order-service
          - makeline-service
          - product-service
          - ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ matrix.service }}:scan src/${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ matrix.service }}:scan"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"

      - name: Parse results and create issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const service = '${{ matrix.service }}';

            let results;
            try {
              results = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
            } catch (e) {
              console.log('No Trivy results file or invalid JSON, skipping');
              core.setOutput('issue_number', '');
              return;
            }

            const vulns = (results.Results || [])
              .flatMap(r => r.Vulnerabilities || [])
              .filter(v => v.Severity === 'CRITICAL' || v.Severity === 'HIGH');

            if (vulns.length === 0) {
              console.log(`No CRITICAL/HIGH vulnerabilities found in ${service}`);
              core.setOutput('issue_number', '');
              return;
            }

            // Deduplicate: skip if an open issue already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: `security,automated,containers,${service}`,
              state: 'open'
            });
            if (existing.data.length > 0) {
              console.log('Open issue already exists, skipping creation');
              core.setOutput('issue_number', '');
              return;
            }

            const findings = vulns.slice(0, 15).map(v =>
              `- **${v.PkgName}** ${v.InstalledVersion} → ${v.FixedVersion || 'no fix yet'} (${v.Severity}): ${v.Title || v.VulnerabilityID}`
            ).join('\n');

            const total = vulns.length;
            const truncated = total > 15 ? `\n\n_...and ${total - 15} more. Run Trivy locally for full results._` : '';

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] ${total} container vulnerabilities in ${service}`,
              body: [
                '## Container Image Scan Finding',
                '',
                `**Image:** ${service}`,
                '**Scanner:** Trivy',
                `**Found:** ${total} CRITICAL/HIGH vulnerabilities`,
                '',
                '### Top Findings',
                findings,
                truncated,
                '',
                '### Remediation',
                `- Update base image in \`src/${service}/Dockerfile\` to a newer version`,
                '- Update vulnerable OS packages or application dependencies',
                '- Rebuild and re-scan to verify fixes',
                '',
                '> This issue was auto-generated by the container scan workflow.',
              ].join('\n'),
              labels: ['security', 'automated', 'containers', service],
            });
            core.setOutput('issue_number', issue.data.number);

      - name: Assign Copilot to issue
        if: steps.create-issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"
          REPO="${{ github.repository }}"
          ASSIGNED=false

          for ASSIGNEE in "copilot-swe-agent[bot]" "copilot-swe-agent" "Copilot" "copilot"; do
            echo "Trying assignee: $ASSIGNEE"
            gh api "repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
              --method POST \
              --input - <<< "{\"assignees\":[\"$ASSIGNEE\"]}" 2>&1 || true

            CURRENT=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '[.assignees[].login] | join(",")')
            if echo "$CURRENT" | grep -qi "copilot"; then
              echo "✅ Assigned $ASSIGNEE to issue #$ISSUE_NUMBER (current: $CURRENT)"
              ASSIGNED=true
              break
            else
              echo "  Not assigned (current: $CURRENT)"
            fi
          done

          if [[ "$ASSIGNED" != "true" ]]; then
            echo "::warning::Could not auto-assign Copilot to issue #$ISSUE_NUMBER — assign manually from the UI"
          fi
